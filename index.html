<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão De Frota — Monitoramento Operacional</title>
    <meta name="description"
        content="Sistema de monitoramento e gestão de frota em tempo real. Acompanhe a produtividade, manutenção e alertas dos equipamentos.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React 18 + Babel (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- CSS Modules -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
</head>

<body class="font-sans antialiased">

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-logo-wrapper">
                <div class="loading-ring"></div>
                <img src="public/logo-custom.svg" alt="Logo">
            </div>
            <div class="loading-title">GESTÃO DE FROTA</div>
            <div class="loading-subtitle">Sistema de Monitoramento Operacional</div>
            <div class="loading-bar-container">
                <div class="loading-bar-fill"></div>
            </div>
            <div class="loading-status">Inicializando módulos...</div>
        </div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <!-- ═══════════════════════════════════════════════════════ -->
    <!--  JS MODULES — Loaded in dependency order               -->
    <!-- ═══════════════════════════════════════════════════════ -->

    <!-- 1. Core: Config & Utilities (plain JS) -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>

    <!-- 2. Services (plain JS) -->
    <script src="js/services/cache.js"></script>
    <script src="js/services/conflict.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/services/socket.js"></script>

    <!-- 3. React Context Providers (JSX via Babel) -->
    <script type="text/babel" src="js/context/ToastContext.js"></script>
    <script type="text/babel" src="js/context/FleetContext.js"></script>

    <!-- 4. Custom Hooks (JSX via Babel) -->
    <script type="text/babel" src="js/hooks/useScrollDirection.js"></script>
    <script type="text/babel" src="js/hooks/useBackHandler.js"></script>

    <!-- 5. UI Components (JSX via Babel) -->
    <script type="text/babel" src="js/components/Sidebar.js"></script>
    <script type="text/babel" src="js/components/EquipmentCard.js"></script>
    <script type="text/babel" src="js/components/TimelineRow.js"></script>
    <script type="text/babel" src="js/components/DetailPanel.js"></script>

    <!-- 6. Pages (JSX via Babel) -->
    <script type="text/babel" src="js/pages/MonitoramentoPage.js"></script>
    <script type="text/babel" src="js/pages/AnalyticsPage.js"></script>
    <script type="text/babel" src="js/pages/MaintenanceTracker.js"></script>
    <script type="text/babel" src="js/pages/AlarmesPage.js"></script>
    <script type="text/babel" src="js/pages/ConfiguracoesPage.js"></script>

    <!-- 7. App Entry Point (JSX via Babel) -->
    <script type="text/babel" src="js/app.js"></script>

</body>

</html>

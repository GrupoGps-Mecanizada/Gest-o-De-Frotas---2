        // ============================================
        // CONFLICT RESOLVER - Sistema de Resolução de Conflitos
        // ============================================

        class ConflictResolver {
            constructor() {
                this.stats = {
                    conflictsResolved: 0,
                    duplicatesRemoved: 0,
                    originalRecords: 0,
                    finalRecords: 0,
                    consecutiveConsolidated: 0
                };

                this.config = {
                    gapTolerance: 60, // segundos
                    conflictResolution: 'priority'
                };

                this.statusPriorities = {
                    'Em manutenção': 15, 'Em Manutenção': 15,
                    'Fora da Planta': 14,
                    'Motor Ligado': 10, 'Trabalhando': 10,
                    'Motor Desligado': 6, 'Parado': 6,
                    'Indisponível': 4, 'Sem Apropriação': 4
                };
            }

            resolveConflicts(eventsList, equipmentName) {
                if (!eventsList || eventsList.length === 0) return [];

                console.log(`🔧 [${equipmentName}] Resolvendo ${eventsList.length} eventos`);
                this.stats.originalRecords += eventsList.length;

                let resolved = eventsList;
                resolved = this.removeDuplicates(resolved);
                resolved = this.sortByTime(resolved);
                resolved = this.resolveOverlaps(resolved);
                resolved = this.consolidateConsecutive(resolved);

                this.stats.finalRecords += resolved.length;

                const reduction = ((1 - resolved.length / eventsList.length) * 100).toFixed(1);
                console.log(`✅ [${equipmentName}] ${eventsList.length} → ${resolved.length} (${reduction}% redução)`);

                return resolved;
            }

            removeDuplicates(events) {
                const seen = new Set();
                return events.filter(evt => {
                    const key = `${evt.dataInicio}-${evt.dataFim}-${evt.descricao}-${evt.status}`;
                    if (seen.has(key)) {
                        this.stats.duplicatesRemoved++;
                        return false;
                    }
                    seen.add(key);
                    return true;
                });
            }

            sortByTime(events) {
                return [...events].sort((a, b) => {
                    const timeA = this.parseTime(a.dataInicio);
                    const timeB = this.parseTime(b.dataInicio);
                    return timeA - timeB;
                });
            }

            resolveOverlaps(events) {
                if (events.length <= 1) return events;

                const resolved = [];
                let current = null;

                for (const evt of events) {
                    if (!current) {
                        current = { ...evt };
                        continue;
                    }

                    const currentEnd = this.parseTime(current.dataFim);
                    const evtStart = this.parseTime(evt.dataInicio);

                    if (evtStart < currentEnd) {
                        this.stats.conflictsResolved++;
                        const priority1 = this.statusPriorities[current.descricao] || 0;
                        const priority2 = this.statusPriorities[evt.descricao] || 0;

                        if (priority2 > priority1) {
                            current = { ...evt };
                        }
                    } else {
                        resolved.push(current);
                        current = { ...evt };
                    }
                }

                if (current) resolved.push(current);
                return resolved;
            }

            consolidateConsecutive(events) {
                if (events.length <= 1) return events;

                const consolidated = [];
                let current = null;

                for (const evt of events) {
                    if (!current) {
                        current = { ...evt };
                        continue;
                    }

                    const currentEnd = this.parseTime(current.dataFim);
                    const evtStart = this.parseTime(evt.dataInicio);
                    const gapSeconds = (evtStart - currentEnd) / 1000;

                    const sameStatus = (current.descricao === evt.descricao) ||
                        (current.status === evt.status);

                    if (sameStatus && Math.abs(gapSeconds) <= this.config.gapTolerance) {
                        this.stats.consecutiveConsolidated++;
                        current.dataFim = evt.dataFim;
                        current.tempoTotal = this.calculateDuration(current.dataInicio, current.dataFim);
                    } else {
                        consolidated.push(current);
                        current = { ...evt };
                    }
                }

                if (current) consolidated.push(current);
                return consolidated;
            }

            parseTime(timeStr) {
                if (!timeStr) return 0;
                if (timeStr instanceof Date) return timeStr.getTime();

                const match = timeStr.match(/(\d{1,2}):(\d{2})/);
                if (match) {
                    const hours = parseInt(match[1]);
                    const minutes = parseInt(match[2]);
                    const now = new Date();
                    now.setHours(hours, minutes, 0, 0);
                    return now.getTime();
                }

                return new Date(timeStr).getTime();
            }

            calculateDuration(start, end) {
                if (!start || !end) return '00:00';
                const startTime = this.parseTime(start);
                const endTime = this.parseTime(end);
                const diff = endTime - startTime;
                if (diff < 0) return '00:00';
                const hours = Math.floor(diff / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            }

            getStats() {
                return { ...this.stats };
            }

            resetStats() {
                this.stats = {
                    conflictsResolved: 0,
                    duplicatesRemoved: 0,
                    originalRecords: 0,
                    finalRecords: 0,
                    consecutiveConsolidated: 0
                };
            }
        }

        // ============================================
        // CACHE MANAGER - Sistema de Cache Inteligente
        // ============================================

        class CacheManager {
            constructor() {
                this.cache = new Map();
                this.lastHashes = new Map();
                this.hitCount = 0;
                this.missCount = 0;
                this.defaultTTL = 3 * 60 * 1000; // 3 minutos
            }

            has(key) {
                if (!this.cache.has(key)) return false;

                const item = this.cache.get(key);
                if (item.expires && Date.now() >= item.expires) {
                    this.cache.delete(key);
                    return false;
                }
                return true;
            }

            get(key) {
                if (!this.has(key)) {
                    this.missCount++;
                    return null;
                }

                this.hitCount++;
                return this.cache.get(key).value;
            }

            set(key, value, ttl = null) {
                const expirationTime = ttl || this.defaultTTL;
                this.cache.set(key, {
                    value: value,
                    expires: expirationTime > 0 ? Date.now() + expirationTime : null,
                    created: Date.now()
                });
            }

            generateHash(data) {
                const str = JSON.stringify(data);
                let hash = 5381;
                for (let i = 0; i < str.length; i++) {
                    hash = ((hash << 5) + hash) + str.charCodeAt(i);
                    hash = hash & hash;
                }
                return hash.toString(36);
            }

            hasChanged(key, data) {
                const newHash = this.generateHash(data);
                const oldHash = this.lastHashes.get(key);
                this.lastHashes.set(key, newHash);

                if (!oldHash) return true;
                return oldHash !== newHash;
            }

            clear() {
                this.cache.clear();
                this.lastHashes.clear();
            }

            getStats() {
                const hitRate = this.hitCount + this.missCount > 0
                    ? (this.hitCount / (this.hitCount + this.missCount) * 100).toFixed(1)
                    : 0;

                return {
                    size: this.cache.size,
                    hits: this.hitCount,
                    misses: this.missCount,
                    hitRate: `${hitRate}%`
                };
            }
        }

        // Criar instâncias globais

                if (!ref.current || !window.lucide) return;

                // Lucide UMD armazena ícones com chaves PascalCase
                const pascalName = toPascalCase(name);
                const iconData = window.lucide.icons[pascalName];

                if (className) attrs['class'] = className;
                const svg = window.lucide.createElement(iconData, attrs);

                ref.current.innerHTML = '';
                ref.current.appendChild(svg);
            }, [name, size, className]);

            return <span ref={ref} style={{ display: 'inline-flex', width: size, height: size }} {...props} />;

        const normalizeStatus = (rawStatus) => {
            if (!rawStatus) return 'default';
            const s = rawStatus.toLowerCase().trim();

            // Mapeamento completo baseado em todos os status do GaussFleet
            if (s.includes('motor secundário')) return 'motor secundário ligado';
            if (s === 'motor ligado' || s === 'trabalhando' || s === 'operando') return 'motor ligado';
            if (s === 'motor desligado') return 'motor desligado';
            if (s === 'parado ligado') return 'parado ligado';

            if (s.includes('manutenção') || s.includes('manutencao')) return 'em manutenção';
            if (s === 'fora da planta') return 'fora da planta';
            if (s.includes('indisponível') && s.includes('sem apropriação')) return 'indisponível / sem apropriação';

            if (s === 'sem apropriação' || s === 'sem apropriacao') return 'sem apropriação';
            if (s === 'troca de turno') return 'troca de turno';
            if (s === 'fora do regime') return 'fora do regime';

            // Fallback para parciais se não houver match exato
            if (s.includes('ligado')) return 'motor ligado';
            if (s.includes('desligado')) return 'motor desligado';
            if (s.includes('parad')) return 'parado';

            return 'default';
        };

        const formatDateTime = (dateString) => {
            if (!dateString) return '--:-- --/--/----';

            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) {
                    return dateString.replace('GMT-0300 (Horário Padrão de Brasília)', '').substring(0, 16);
                }
                const day = date.getDate().toString().padStart(2, '0');
                const month = (date.getMonth() + 1).toString().padStart(2, '0');
                const year = date.getFullYear();
                const hours = date.getHours().toString().padStart(2, '0');
                const minutes = date.getMinutes().toString().padStart(2, '0');
                return `${hours}:${minutes} ${day}/${month}/${year}`;
            } catch (e) {
                return dateString;
            }
        };

        const timeToMinutes = (timeStr) => {
            if (!timeStr) return 0;
            const match = timeStr.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
            if (!match) return 0;
            const hours = parseInt(match[1]);
            const minutes = parseInt(match[2]);
            const seconds = match[3] ? parseInt(match[3]) : 0;
            return (hours * 60) + minutes + (seconds / 60);
        };

        const calculateDuration = (startStr, endStr) => {
            const startMins = timeToMinutes(startStr);
            const endMins = timeToMinutes(endStr);

            let diff = endMins - startMins;
            if (diff < 0) diff += 1440;

            const h = Math.floor(diff / 60);
            const m = diff % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        };

        // Formata duração: converte ISO 1899-12-30T03:12:28.000Z para "03:12"
        const formatDuration = (val) => {
            if (!val) return '00:00';
            const s = String(val);
            // ISO date string do Google Sheets (1899-12-30T...)
            if (s.includes('1899') || s.includes('T')) {
                try {
                    const d = new Date(s);
                    if (!isNaN(d.getTime())) {
                        return `${d.getUTCHours().toString().padStart(2, '0')}:${d.getUTCMinutes().toString().padStart(2, '0')}`;
                    }
                } catch (e) { }
            }
            // Já é HH:mm ou HH:mm:ss
            if (s.includes(':')) return s.substring(0, 5);
            return s;

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();

                headers: { 'Content-Type': 'text/plain' }

            constructor() {

                this.mockEquipments = [];
            }

            connect(initialData) {
                if (this.isConnected) return;

                console.log('[WebSocket] Conectando ao servidor de telemetria...');
                this.mockEquipments = initialData;
                this.isConnected = true;

                this.notify({ type: 'CONNECTION', payload: { status: 'connected' }, timestamp: Date.now() });
                this.startSimulation();
            }

            disconnect() {
                if (this.intervalId) clearInterval(this.intervalId);
                this.isConnected = false;
                this.notify({ type: 'CONNECTION', payload: { status: 'disconnected' }, timestamp: Date.now() });
                console.log('[WebSocket] Desconectado.');
            }

            subscribe(listener) {
                this.listeners.push(listener);
                return () => {
                    this.listeners = this.listeners.filter(l => l !== listener);
                };
            }

            notify(message) {
                this.listeners.forEach(listener => listener(message));
            }

            startSimulation() {
                // DESATIVADO: A simulação mock gerava status aleatórios falsos

                        const prevCount = prevAlertCountRef.current;

                        // Notifica sobre novos alertas
                        if (prevCount > 0 && newCount > prevCount) {
                            const diff = newCount - prevCount;
                            const newest = res.alerts[res.alerts.length - 1];
                            const severityMap = { alta: 'critical', media: 'warning', baixa: 'info' };
                            addToast(
                                `${diff} novo(s) alerta(s): ${newest?.titulo || newest?.message || 'Verifique o painel'}`,

                            console.log('✅ Dados não mudaram, mantendo estado atual');
                            setLoading(false);
                            return;
                        }

                        // Processar eventos com ConflictResolver
                        const processedVagas = res.vagas.map(vaga => {
                            if (vaga.eventos && vaga.eventos.length > 0) {
                                const resolvedEvents = conflictResolver.resolveConflicts(
                                    vaga.eventos,
                                    vaga.nome
                                );
                                // Atualizar status e horário com base no último evento resolvido
                                const lastEvent = resolvedEvents[resolvedEvents.length - 1];
                                return {
                                    ...vaga,
                                    eventos: resolvedEvents,
                                    // SOBRESCREVE o status bruto do backend com o status processado
                                    status: lastEvent ? lastEvent.descricao : vaga.status,
                                    horario: lastEvent ? (lastEvent.dataFim || lastEvent.dataInicio) : vaga.horario
                                };
                            }
                            return vaga;
                        });

                        // Salvar no cache

                        setIsConnected(true);

                                        const isLastEvent = idx === events.length - 1;

                                        let durationMins = 0;

                                        if (isLastEvent && !evt.dataFim && currentTimeStr) {
                                            const start = timeToMinutes(evt.dataInicio);
                                            const now = timeToMinutes(currentTimeStr);
                                            let diff = now - start;
                                            if (diff < 0) diff += 1440; // Ajuste para virada de dia
                                            durationMins = Math.max(diff, 0.5);
                                        } else {
                                            // Tenta usar o tempoTotal bruto para evitar truncamento de segundos
                                            durationMins = timeToMinutes(evt.tempoTotal);
                                        }

                                        const flexGrow = durationMins > 0 ? durationMins : 0.5;

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const res = await api.getDashboardData();
                        if (res.success && res.data) {
                            setStats(res.data);
                        }
                    } catch (e) {
                        console.error("Erro ao carregar analytics:", e);
                    } finally {
                        setLoading(false);
                    }
                };
                loadData();
                const interval = setInterval(loadData, 60000); // Atualiza a cada 1 min
                return () => clearInterval(interval);

                return (

                totalStoppedMin: 0,

        // Alarmes Page
        const AlarmesPage = () => {
            const { alerts, handleDismissAlert, refreshAlerts } = useFleet();
            const [activeTab, setActiveTab] = useState('alerts');
            const [rules, setRules] = useState([]);
            const [rulesLoading, setRulesLoading] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [newRule, setNewRule] = useState({ name: '', conditionType: 'parado_mais_que', threshold: '2' });
            const { addToast } = useToast();

            // Carrega regras do backend
            useEffect(() => {
                (async () => {
                    const res = await api.getRules();
                    if (res.success && Array.isArray(res.rules)) {
                        setRules(res.rules);
                    }
                    setRulesLoading(false);
                })();
            }, []);

            const handleAddRule = async () => {
                const conditionLabels = {
                    parado_mais_que: 'Parado mais que',
                    sem_apropriacao_mais_que: 'Sem apropriação mais que',
                    manutencao_mais_que: 'Em manutenção mais que'
                };

                const rulePayload = {
                    name: newRule.name || 'Nova Regra',
                    condition: newRule.conditionType,
                    timeLimit: parseFloat(newRule.threshold) || 2,
                    severity: 'warning'
                };

                const res = await api.saveRule(rulePayload);
                if (res.success) {
                    // Re-fetch rules
                    const rulesRes = await api.getRules();
                    if (rulesRes.success) setRules(rulesRes.rules);
                    addToast('Regra criada com sucesso!', 'success');
                } else {
                    addToast('Erro ao criar regra.', 'critical');
                }
                setIsModalOpen(false);
                setNewRule({ name: '', conditionType: 'parado_mais_que', threshold: '2' });
            };

            const severityColors = {
                alta: { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-700', badge: 'bg-red-100 text-red-700' },
                media: { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-700', badge: 'bg-amber-100 text-amber-700' },
                baixa: { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700', badge: 'bg-blue-100 text-blue-700' },
                warning: { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-700', badge: 'bg-amber-100 text-amber-700' },
                critical: { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-700', badge: 'bg-red-100 text-red-700' },
            };

            const conditionLabels = {
                parado_mais_que: 'Parado mais que',
                sem_apropriacao_mais_que: 'Sem apropriação mais que',
                manutencao_mais_que: 'Em manutenção mais que'

                                </div>
                            ) : alerts.map(alert => {
                                const sev = severityColors[alert.severity] || severityColors.warning;
                                return (
                                    <div key={alert.id} className={`flex flex-col sm:flex-row items-start sm:items-center justify-between p-5 ${sev.bg} border ${sev.border} rounded-2xl transition-all animate-fade-in`}>

                                            <div className={`p-3 rounded-xl ${sev.badge}`}>

                                            </div>
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2 mb-1 flex-wrap">

                                                    <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded-full ${sev.badge}`}>{alert.severity || 'warning'}</span>
                                                </div>
                                                <p className="text-sm text-slate-600">{alert.message}</p>

                                    <p className="text-slate-400 font-medium">Nenhuma regra configurada. Crie uma regra para gerar alertas automaticamente.</p>
                                </div>
                            ) : rules.map(rule => (
                                <div key={rule.id} className="group flex flex-col sm:flex-row items-start sm:items-center justify-between p-5 bg-white border border-slate-200 rounded-2xl hover:border-blue-300 hover:shadow-md transition-all">
                                    <div className="flex items-center gap-5 mb-3 sm:mb-0">
                                        <div className="p-4 rounded-2xl shadow-sm bg-blue-50 text-blue-500">
                                            <Bell size={24} />

                                            <h4 className="font-bold text-lg text-slate-800">{rule.name}</h4>
                                            <p className="text-sm text-slate-500 mt-1 flex items-center gap-2">
                                                <span className="bg-slate-100 px-2 py-0.5 rounded text-xs font-mono border border-slate-200">IF</span>
                                                {conditionLabels[rule.condition] || rule.condition} {rule.timeLimit}h
                                            </p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <span className={`text-xs font-bold uppercase px-3 py-1 rounded-full ${rule.active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}`}>
                                            {rule.active ? 'Ativa' : 'Inativa'}

                                        <span className={`text-xs font-bold uppercase px-3 py-1 rounded-full ${severityColors[rule.severity]?.badge || 'bg-slate-100 text-slate-500'}`}>
                                            {rule.severity || 'N/D'}

                                    </div>
                                </div>
                            ))}
                        </div>

                                    </h3>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-slate-100 p-1 rounded-full hover:bg-slate-200"><X size={18} className="text-slate-500" /></button>

                                    <div>
                                        <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nome da Regra</label>
                                        <input type="text" className="w-full border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Ex: Alerta de Ociosidade" value={newRule.name} onChange={e => setNewRule({ ...newRule, name: e.target.value })} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Condição</label>
                                        <select className="w-full border border-slate-300 rounded-lg p-3 text-sm bg-white focus:ring-2 focus:ring-blue-500 outline-none" value={newRule.conditionType} onChange={e => setNewRule({ ...newRule, conditionType: e.target.value })}>
                                            <option value="parado_mais_que">Parado mais que X horas</option>
                                            <option value="sem_apropriacao_mais_que">Sem apropriação mais que X horas</option>
                                            <option value="manutencao_mais_que">Em manutenção mais que X horas</option>
                                        </select>
                                    </div>

                                        <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Limite de Tempo (Horas)</label>
                                        <input type="number" className="w-full border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="2" value={newRule.threshold} onChange={e => setNewRule({ ...newRule, threshold: e.target.value })} />
                                    </div>
                                    <div className="pt-4">
                                        <button onClick={handleAddRule} className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg">
                                            <Save size={18} /> Salvar e Ativar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Configuracoes Page
        const ConfiguracoesPage = () => {
            const { vagas, isConnected, lastUpdated, refreshData, refreshAlerts } = useFleet();
            const { addToast } = useToast();

            const [pollingInterval, setPollingInterval] = useState('30');
            const [notificationsEnabled, setNotificationsEnabled] = useState(true);
            const [testingConnection, setTestingConnection] = useState(false);
            const [connectionStatus, setConnectionStatus] = useState(null);
            const [saved, setSaved] = useState(false);

            const handleTestConnection = async () => {
                setTestingConnection(true);
                setConnectionStatus(null);
                try {
                    const url = new URL(GAS_URL);
                    url.searchParams.append('action', 'test');
                    url.searchParams.append('ts', Date.now().toString());
                    const res = await fetch(url.toString(), { redirect: 'follow' });
                    const data = await res.json();
                    if (data.success) {
                        setConnectionStatus({ ok: true, message: data.message, timestamp: data.timestamp });
                        addToast('Conexão com a API está funcionando!', 'success');
                    } else {
                        setConnectionStatus({ ok: false, message: 'API retornou erro' });
                        addToast('API retornou erro.', 'critical');
                    }
                } catch (e) {
                    setConnectionStatus({ ok: false, message: e.message });
                    addToast('Falha na conexão com a API.', 'critical');
                } finally {
                    setTestingConnection(false);
                }
            };

            const handleExportCSV = () => {
                if (!vagas || vagas.length === 0) {
                    addToast('Nenhum dado para exportar.', 'warning');
                    return;
                }
                const header = 'Vaga,Placa,Status,Última Atualização,Total Eventos\n';
                const rows = vagas.map(v =>
                    `"${v.nome}","${v.placa}","${v.status}","${v.horario}",${(v.eventos || []).length}`
                ).join('\n');
                const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `frota_export_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
                addToast('Arquivo CSV exportado com sucesso!', 'success');
            };

            const handleForceRefresh = async () => {
                addToast('Atualizando dados...', 'info');
                await refreshData();
                await refreshAlerts();
                addToast('Dados atualizados!', 'success');
            };

            const handleSave = () => {
                setSaved(true);
                addToast('Configurações salvas com sucesso!', 'success');
                setTimeout(() => setSaved(false), 2000);
            };

            return (
                <div className="p-8 h-full overflow-y-auto custom-scrollbar">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-800">Configurações</h1>
                            <p className="text-slate-500 text-sm">Gerenciar preferências do sistema de gestão de frota</p>
                        </div>
                        {saved && <span className="text-emerald-600 font-bold text-sm bg-emerald-50 px-3 py-1 rounded-full animate-pulse">Salvo!</span>}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Conexão com API */}

                                            <Icon name="copy" size={16} />
                                        </button>
                                    </div>
                                </div>

                                <div className="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-3 h-3 rounded-full ${isConnected ? 'bg-emerald-500 animate-pulse' : 'bg-red-400'}`}></div>
                                        <div>
                                            <p className="text-sm font-bold text-slate-700">{isConnected ? 'Conectado' : 'Desconectado'}</p>
                                            <p className="text-[10px] text-slate-400 font-mono">
                                                {lastUpdated ? `Última sincronização: ${lastUpdated.toLocaleTimeString('pt-BR')}` : 'Aguardando...'}
                                            </p>
                                        </div>
                                    </div>
                                    <button
                                        onClick={handleTestConnection}
                                        disabled={testingConnection}
                                        className="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-500 transition-all disabled:opacity-50 flex items-center gap-2"
                                    >
                                        {testingConnection ? (
                                            <><RefreshCw size={14} className="animate-spin" /> Testando...</>
                                        ) : (
                                            <><Zap size={14} /> Testar Conexão</>
                                        )}
                                    </button>
                                </div>

                                {connectionStatus && (
                                    <div className={`p-3 rounded-lg text-xs font-medium ${connectionStatus.ok ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-red-50 text-red-700 border border-red-200'}`}>
                                        {connectionStatus.ok ? '✅' : '❌'} {connectionStatus.message}
                                        {connectionStatus.timestamp && <span className="block text-[10px] opacity-70 mt-1">Timestamp: {connectionStatus.timestamp}</span>}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Polling & Atualização */}
                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">

                                <RefreshCw size={16} className="text-blue-500" /> Atualização de Dados
                            </div>
                            <div className="p-6 space-y-5">
                                <div>
                                    <label className="block text-xs font-bold uppercase text-slate-500 mb-2">Intervalo de Polling (segundos)</label>
                                    <div className="flex items-center gap-4">
                                        <input
                                            type="range" min="10" max="120" step="5"

                                            onChange={e => setPollingInterval(e.target.value)}

                                        />

                                    </div>
                                    <p className="text-[10px] text-slate-400 mt-2">Define a frequência com que o sistema busca novos dados do backend. Valores menores = mais atual, porém mais requisições.</p>
                                </div>

                                <div className="border-t border-slate-100 pt-5">
                                    <button
                                        onClick={handleForceRefresh}
                                        className="w-full bg-slate-100 text-slate-700 py-3 rounded-xl text-sm font-bold hover:bg-slate-200 transition-all flex items-center justify-center gap-2"
                                    >
                                        <RefreshCw size={16} /> Forçar Atualização Agora
                                    </button>
                                </div>

                                <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                    <p className="text-xs text-blue-700 font-medium flex items-center gap-2">
                                        <Activity size={14} /> Dados monitorados em tempo real: <strong>{vagas.length} vagas</strong>
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            <div className="p-4 bg-slate-50 border-b border-slate-100 font-bold text-slate-700 text-sm uppercase tracking-wider flex items-center gap-2">
                                <BellRing size={16} className="text-amber-500" /> Notificações
                            </div>
                            <div className="p-6 space-y-4">
                                <div className="flex items-center justify-between p-4 bg-slate-50 rounded-xl">
                                    <div>
                                        <h4 className="text-sm font-bold text-slate-700">Toast de Novos Alertas</h4>
                                        <p className="text-xs text-slate-400 mt-0.5">Exibir notificação pop-up quando novos alertas forem detectados</p>
                                    </div>
                                    <div
                                        className={`w-12 h-6 flex items-center rounded-full p-1 cursor-pointer transition-colors duration-300 ${notificationsEnabled ? 'bg-blue-600 justify-end' : 'bg-slate-200 justify-start'}`}

                                    >
                                        <div className="bg-white w-4 h-4 rounded-full shadow-md"></div>
                                    </div>
                                </div>

                                <button
                                    onClick={() => addToast('Este é um exemplo de notificação toast!', 'info')}
                                    className="w-full text-left p-4 border border-dashed border-slate-200 rounded-xl hover:bg-slate-50 transition-colors"
                                >
                                    <p className="text-sm font-bold text-slate-600">Testar Notificação</p>
                                    <p className="text-xs text-slate-400 mt-0.5">Clique para visualizar um exemplo de toast</p>
                                </button>
                            </div>
                        </div>

                        {/* Estatísticas do Sistema (NOVO) */}
                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            <div className="p-4 bg-slate-50 border-b border-slate-100 font-bold text-slate-700 text-sm uppercase tracking-wider flex items-center gap-2">
                                <BarChart3 size={16} className="text-blue-500" /> Estatísticas de Performance
                            </div>
                            <div className="p-6 space-y-4">
                                <button
                                    onClick={() => {
                                        const stats = window.fleetSystemStats ? window.fleetSystemStats() : null;
                                        if (stats) {
                                            console.log('=== 📊 ESTATÍSTICAS DO SISTEMA ===');
                                            console.log('Cache:', stats.cache);
                                            console.log('Conflict Resolver:', stats.conflictResolver);
                                            console.log('==================================');
                                            addToast('Estatísticas mostradas no console (F12)', 'info');
                                        } else {
                                            addToast('Sistema ainda não inicializado', 'warning');
                                        }
                                    }}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2"
                                >
                                    <BarChart3 size={18} /> Ver Estatísticas no Console
                                </button>

                                <button
                                    onClick={() => {
                                        if (window.fleetClearCache) {
                                            window.fleetClearCache();
                                            addToast('Cache limpo com sucesso!', 'success');
                                        } else {
                                            addToast('Sistema ainda não inicializado', 'warning');
                                        }
                                    }}
                                    className="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2"
                                >
                                    <RefreshCw size={18} /> Limpar Cache
                                </button>

                                <div className="mt-4 p-4 bg-blue-50 rounded-lg border border-blue-100">
                                    <p className="text-xs text-blue-700">
                                        <strong>💡 Dica:</strong> Use o console do navegador (F12) para monitorar:
                                    </p>
                                    <ul className="text-xs text-blue-600 mt-2 space-y-1 ml-4 list-disc">
                                        <li>Logs de consolidação de eventos</li>
                                        <li>Estatísticas de cache (hit rate)</li>
                                        <li>Duplicatas removidas</li>
                                        <li>Conflitos resolvidos</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        {/* Exportação de Dados */}
                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            <div className="p-4 bg-slate-50 border-b border-slate-100 font-bold text-slate-700 text-sm uppercase tracking-wider flex items-center gap-2">
                                <BarChart2 size={16} className="text-indigo-500" /> Dados & Exportação
                            </div>
                            <div className="p-6 space-y-4">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-slate-50 p-4 rounded-xl text-center">
                                        <p className="text-2xl font-bold text-slate-800">{vagas.length}</p>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Vagas Monitoradas</p>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-xl text-center">
                                        <p className="text-2xl font-bold text-slate-800">{vagas.reduce((s, v) => s + (v.eventos?.length || 0), 0)}</p>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Eventos Hoje</p>
                                    </div>
                                </div>

                                <button
                                    onClick={handleExportCSV}
                                    className="w-full bg-indigo-600 text-white py-3 rounded-xl text-sm font-bold hover:bg-indigo-500 transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/20 active:scale-95"
                                >
                                    <Save size={16} /> Exportar Dados (CSV)
                                </button>

                                <button
                                    onClick={() => window.open('https://docs.google.com/spreadsheets', '_blank')}
                                    className="w-full bg-slate-100 text-slate-700 py-3 rounded-xl text-sm font-bold hover:bg-slate-200 transition-all flex items-center justify-center gap-2"
                                >
                                    <Database size={16} /> Abrir Planilha no Google Sheets
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="flex justify-end pt-6">
                        <button className="flex items-center gap-2 bg-slate-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-800 transition-all shadow-lg active:scale-95" onClick={handleSave}>
                            <Save size={18} /> Salvar Configurações
                        </button>
                    </div>

                    <div className="mt-8 text-center text-slate-400 text-xs font-mono">
                        Gestão de Frota v5.0 • Build {new Date().getFullYear()}.{(new Date().getMonth() + 1).toString().padStart(2, '0')}
                    </div>
                </div>
            );
        };

        // ============================================
        // MAIN APP
        // ============================================

        const App = () => {
            const [currentPage, setCurrentPage] = useState('monitoramento');

            return (
                <ToastProvider>
                    <FleetProvider>
                        <div className="flex h-screen bg-slate-50 font-sans text-slate-900 overflow-hidden">
                            <Sidebar currentPage={currentPage} onNavigate={setCurrentPage} />

                            <main className="flex-1 ml-64 h-full overflow-hidden relative flex flex-col">
                                {currentPage === 'monitoramento' && <MonitoramentoPage />}
                                {currentPage === 'analytics' && <AnalyticsPage />}
                                {currentPage === 'alarmes' && <AlarmesPage />}
                                {currentPage === 'configuracoes' && <ConfiguracoesPage />}
                            </main>
                        </div>
                    </FleetProvider>
                </ToastProvider>
            );
        };

        // ============================================
        // RENDER
        // ============================================

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

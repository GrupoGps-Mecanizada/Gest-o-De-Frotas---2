        // ============================================
        // CONFLICT RESOLVER - Sistema de Resolução de Conflitos
        // ============================================

        class ConflictResolver {
            constructor() {
                this.stats = {
                    conflictsResolved: 0,
                    duplicatesRemoved: 0,
                    originalRecords: 0,
                    finalRecords: 0,
                    consecutiveConsolidated: 0
                };

                this.config = {
                    gapTolerance: 60, // segundos
                    conflictResolution: 'priority'
                };

                this.statusPriorities = {
                    'Em manutenção': 15, 'Em Manutenção': 15,
                    'Fora da Planta': 14,
                    'Motor Ligado': 10, 'Trabalhando': 10,
                    'Motor Desligado': 6, 'Parado': 6,
                    'Indisponível': 4, 'Sem Apropriação': 4
                };
            }

            resolveConflicts(eventsList, equipmentName) {
                if (!eventsList || eventsList.length === 0) return [];

                console.log(`🔧 [${equipmentName}] Resolvendo ${eventsList.length} eventos`);
                this.stats.originalRecords += eventsList.length;

                let resolved = eventsList;
                resolved = this.removeDuplicates(resolved);
                resolved = this.sortByTime(resolved);
                resolved = this.resolveOverlaps(resolved);
                resolved = this.consolidateConsecutive(resolved);

                this.stats.finalRecords += resolved.length;

                const reduction = ((1 - resolved.length / eventsList.length) * 100).toFixed(1);
                console.log(`✅ [${equipmentName}] ${eventsList.length} → ${resolved.length} (${reduction}% redução)`);

                return resolved;
            }

            removeDuplicates(events) {
                const seen = new Set();
                return events.filter(evt => {
                    const key = `${evt.dataInicio}-${evt.dataFim}-${evt.descricao}-${evt.status}`;
                    if (seen.has(key)) {
                        this.stats.duplicatesRemoved++;
                        return false;
                    }
                    seen.add(key);
                    return true;
                });
            }

            sortByTime(events) {
                return [...events].sort((a, b) => {
                    const timeA = this.parseTime(a.dataInicio);
                    const timeB = this.parseTime(b.dataInicio);
                    return timeA - timeB;
                });
            }

            resolveOverlaps(events) {
                if (events.length <= 1) return events;

                const resolved = [];
                let current = null;

                for (const evt of events) {
                    if (!current) {
                        current = { ...evt };
                        continue;
                    }

                    const currentEnd = this.parseTime(current.dataFim);
                    const evtStart = this.parseTime(evt.dataInicio);

                    if (evtStart < currentEnd) {
                        this.stats.conflictsResolved++;
                        const priority1 = this.statusPriorities[current.descricao] || 0;
                        const priority2 = this.statusPriorities[evt.descricao] || 0;

                        if (priority2 > priority1) {
                            current = { ...evt };
                        }
                    } else {
                        resolved.push(current);
                        current = { ...evt };
                    }
                }

                if (current) resolved.push(current);
                return resolved;
            }

            consolidateConsecutive(events) {
                if (events.length <= 1) return events;

                const consolidated = [];
                let current = null;

                for (const evt of events) {
                    if (!current) {
                        current = { ...evt };
                        continue;
                    }

                    const currentEnd = this.parseTime(current.dataFim);
                    const evtStart = this.parseTime(evt.dataInicio);
                    const gapSeconds = (evtStart - currentEnd) / 1000;

                    const sameStatus = (current.descricao === evt.descricao) ||
                        (current.status === evt.status);

                    if (sameStatus && Math.abs(gapSeconds) <= this.config.gapTolerance) {
                        this.stats.consecutiveConsolidated++;
                        current.dataFim = evt.dataFim;
                        current.tempoTotal = this.calculateDuration(current.dataInicio, current.dataFim);
                    } else {
                        consolidated.push(current);
                        current = { ...evt };
                    }
                }

                if (current) consolidated.push(current);
                return consolidated;
            }

            parseTime(timeStr) {
                if (!timeStr) return 0;
                if (timeStr instanceof Date) return timeStr.getTime();

                const match = timeStr.match(/(\d{1,2}):(\d{2})/);
                if (match) {
                    const hours = parseInt(match[1]);
                    const minutes = parseInt(match[2]);
                    const now = new Date();
                    now.setHours(hours, minutes, 0, 0);
                    return now.getTime();
                }

                return new Date(timeStr).getTime();
            }

            calculateDuration(start, end) {
                if (!start || !end) return '00:00';
                const startTime = this.parseTime(start);
                const endTime = this.parseTime(end);
                const diff = endTime - startTime;
                if (diff < 0) return '00:00';
                const hours = Math.floor(diff / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            }

            getStats() {
                return { ...this.stats };
            }

            resetStats() {
                this.stats = {
                    conflictsResolved: 0,
                    duplicatesRemoved: 0,
                    originalRecords: 0,
                    finalRecords: 0,
                    consecutiveConsolidated: 0
                };
            }
        }

        class CacheManager {
            constructor() {
                this.cache = new Map();
                this.lastHashes = new Map();
                this.hitCount = 0;
                this.missCount = 0;
                this.defaultTTL = 3 * 60 * 1000; // 3 minutos
            }

            has(key) {
                if (!this.cache.has(key)) return false;

                const item = this.cache.get(key);
                if (item.expires && Date.now() >= item.expires) {
                    this.cache.delete(key);
                    return false;
                }
                return true;
            }

            get(key) {
                if (!this.has(key)) {
                    this.missCount++;
                    return null;
                }

                this.hitCount++;
                return this.cache.get(key).value;
            }

            set(key, value, ttl = null) {
                const expirationTime = ttl || this.defaultTTL;
                this.cache.set(key, {
                    value: value,
                    expires: expirationTime > 0 ? Date.now() + expirationTime : null,
                    created: Date.now()
                });
            }

            generateHash(data) {
                const str = JSON.stringify(data);
                let hash = 5381;
                for (let i = 0; i < str.length; i++) {
                    hash = ((hash << 5) + hash) + str.charCodeAt(i);
                    hash = hash & hash;
                }
                return hash.toString(36);
            }

            hasChanged(key, data) {
                const newHash = this.generateHash(data);
                const oldHash = this.lastHashes.get(key);
                this.lastHashes.set(key, newHash);

                if (!oldHash) return true;
                return oldHash !== newHash;
            }

            clear() {
                this.cache.clear();
                this.lastHashes.clear();
            }

            getStats() {
                const hitRate = this.hitCount + this.missCount > 0
                    ? (this.hitCount / (this.hitCount + this.missCount) * 100).toFixed(1)
                    : 0;

                return {
                    size: this.cache.size,
                    hits: this.hitCount,
                    misses: this.missCount,
                    hitRate: `${hitRate}%`
                };
            }
        }

        const normalizeStatus = (rawStatus, equipmentName) => {
            if (!rawStatus) return 'default';
            const s = rawStatus.toLowerCase().trim();
            const name = (equipmentName || "").toUpperCase();

            // 1. REGRA DE MANUTENÇÃO (Prioridade Máxima)
            if (s.includes('manutenção') || s.includes('manutencao')) return 'em manutenção';

            // 2. REGRA ESPECÍFICA: AUTO VÁCUO
            if (name.includes('AUTO VÁCUO') || name.includes('AUTO VACUO')) {
                // "Parado Ligado" é produtivo (sucção) -> Mapeia para working (motor ligado)
                if (s.includes('parado ligado')) return 'motor ligado';
                if (s.includes('motor ligado') || s.includes('trabalhando') || s.includes('operando')) return 'motor ligado';
            }

            // 3. REGRA ESPECÍFICA: ALTA PRESSÃO / HIPER VÁCUO

                // "Motor Secundário" é o único produtivo real

                // "Motor Ligado" sem secundário também é improdutivo

            if (s.includes('refeição') || s.includes('refeicao')) return 'refeição';

            if (s.includes('ligado')) return 'motor ligado';
            if (s.includes('desligado')) return 'motor desligado';
            if (s.includes('parad')) return 'parado';

            if (!dateString) return '--:-- --/--/----';

            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) {
                    return dateString.replace('GMT-0300 (Horário Padrão de Brasília)', '').substring(0, 16);
                }
                const day = date.getDate().toString().padStart(2, '0');
                const month = (date.getMonth() + 1).toString().padStart(2, '0');
                const year = date.getFullYear();
                const hours = date.getHours().toString().padStart(2, '0');
                const minutes = date.getMinutes().toString().padStart(2, '0');
                return `${hours}:${minutes} ${day}/${month}/${year}`;
            } catch (e) {
                return dateString;
            }
        };

            const match = timeStr.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
            if (!match) return 0;
            const hours = parseInt(match[1]);
            const minutes = parseInt(match[2]);
            const seconds = match[3] ? parseInt(match[3]) : 0;
            return (hours * 60) + minutes + (seconds / 60);
        };

        const calculateDuration = (startStr, endStr) => {
            const startMins = timeToMinutes(startStr);

            const h = Math.floor(diff / 60);
            const m = diff % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();

        const useScrollDirection = (scrollRef) => {
            const [scrollDirection, setScrollDirection] = useState("up");
            const prevOffsetRef = useRef(0);
            const rafRef = useRef(null);
            const lockRef = useRef(false);

            useEffect(() => {
                const handleScroll = () => {
                    // No desktop (md: 768px+), a barra é sempre visível — não processar
                    if (window.innerWidth >= 768) return;
                    if (lockRef.current) return;
                    if (rafRef.current) return;

                    rafRef.current = requestAnimationFrame(() => {
                        rafRef.current = null;
                        if (!scrollRef.current) return;
                        const currentOffset = scrollRef.current.scrollTop;
                        const diff = currentOffset - prevOffsetRef.current;
                        if (Math.abs(diff) > 30) {
                            const newDir = (diff > 0 && currentOffset > 80) ? "down" : (diff < 0 ? "up" : null);
                            if (newDir) {
                                setScrollDirection(prev => {
                                    if (prev !== newDir) {
                                        // Lock para evitar oscilação durante transição CSS
                                        lockRef.current = true;
                                        setTimeout(() => { lockRef.current = false; }, 400);
                                        return newDir;
                                    }
                                    return prev;
                                });
                            }
                            prevOffsetRef.current = currentOffset;
                        }
                    });
                };

                const el = scrollRef.current;
                if (el) el.addEventListener("scroll", handleScroll, { passive: true });
                return () => {
                    if (el) el.removeEventListener("scroll", handleScroll);
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                };
            }, [scrollRef]);

            return scrollDirection;

        // Detail Panel Component

        // ============================================
        // MAINTENANCE TRACKER COMPONENT

        const MaintenanceTracker = () => {
            const { vagas } = useFleet();
            const [searchText, setSearchText] = useState('');
            const [selectedEquip, setSelectedEquip] = useState(null);

            useBackHandler(!!selectedEquip, () => setSelectedEquip(null));



            const calculateStats = () => {
                const stats = { totalTime: 0, totalWorking: 0, totalMaint: 0, rankingFreq: [], rankingTime: [], equipList: [] };
                const maintMap = {};

                vagas.forEach(v => {
                    if (v.eventos) {
                        const equipEntry = { name: v.nome, placa: v.placa, count: 0, time: 0, events: [] };
                        v.eventos.forEach(evt => {
                            const evtStatus = normalizeStatus(evt.status || evt.descricao, v.nome);
                            const duration = timeToMinutes(evt.tempoTotal);
                            stats.totalTime += duration;
                            if (evtStatus === 'motor ligado' || evtStatus === 'motor secundário ligado') {
                                stats.totalWorking += duration;
                            }
                            if (evtStatus === 'em manutenção') {
                                stats.totalMaint += duration;
                                if (!maintMap[v.nome]) maintMap[v.nome] = { name: v.nome, placa: v.placa, count: 0, time: 0, events: [] };
                                maintMap[v.nome].count++;
                                maintMap[v.nome].time += duration;
                                maintMap[v.nome].events.push({
                                    descricao: evt.descricao || evt.status || 'Manutenção',
                                    dataInicio: evt.dataInicio || '--',
                                    dataFim: evt.dataFim || '--',
                                    duration: duration
                                });
                            }
                        });
                    }
                });

                stats.equipList = Object.values(maintMap).sort((a, b) => b.time - a.time);
                stats.rankingFreq = [...stats.equipList].sort((a, b) => b.count - a.count).slice(0, 5);
                stats.rankingTime = [...stats.equipList].sort((a, b) => b.time - a.time).slice(0, 5);
                return stats;
            };

            const data = calculateStats();
            const efficiency = data.totalTime > 0 ? ((data.totalWorking / data.totalTime) * 100).toFixed(1) : 0;
            const maintPct = data.totalTime > 0 ? ((data.totalMaint / data.totalTime) * 100).toFixed(1) : 0;

            const filteredEquips = data.equipList.filter(e =>
                e.name.toLowerCase().includes(searchText.toLowerCase()) ||
                e.placa.toLowerCase().includes(searchText.toLowerCase())
            );

            const activeEquip = selectedEquip ? data.equipList.find(e => e.name === selectedEquip) : null;

            return (

                                <div className="bg-amber-500 h-full" style={{ width: `${maintPct}%` }}></div>

                                        <X size={16} />
                                    </button>
                                )}
                            </div>

                                        </div>
                                        <div className="text-right shrink-0">

                                        </div>
                                    </div>

                            </div>
                        </div>

                        {/* COLUNA DIREITA: Detalhes ou Rankings */}
                        <div className="lg:col-span-2">
                            {activeEquip ? (
                                <div className="fixed inset-0 z-50 bg-slate-50 flex flex-col lg:relative lg:inset-auto lg:bg-transparent lg:block animate-slide-in-right lg:animate-fade-in p-4 lg:p-0 overflow-y-auto lg:overflow-visible">
                                    {/* Mobile Header for Details */}
                                    <div className="flex items-center gap-3 mb-6 lg:hidden sticky top-0 bg-slate-50 z-10 py-2 border-b border-slate-200">
                                        <button onClick={() => setSelectedEquip(null)} className="p-2 bg-white rounded-full shadow-sm border border-slate-200 text-slate-600">
                                            <ArrowLeft size={20} />
                                        </button>
                                        <h3 className="font-bold text-slate-800">Detalhes do Ativo</h3>
                                    </div>

                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800">{activeEquip.name}</h3>
                                                <p className="text-sm font-mono text-slate-400">{activeEquip.placa}</p>
                                            </div>

                                                    </div>
                                                    <button onClick={() => setSelectedEquip(null)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-400 hidden lg:block">
                                                        <X size={20} />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                        <table className="w-full text-xs">
                                            <thead className="bg-slate-50 text-slate-500">
                                                <tr>
                                                    <th className="p-3 text-left rounded-l-lg">#</th>
                                                    <th className="p-3 text-left">Descrição</th>
                                                    <th className="p-3 text-center">Início</th>
                                                    <th className="p-3 text-center">Fim</th>
                                                    <th className="p-3 text-center rounded-r-lg">Duração</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {activeEquip.events.map((evt, j) => (
                                                    <tr key={j} className="hover:bg-slate-50">

        // ============================================

            const uniqueStatuses = React.useMemo(() => {

            const filteredVagas = vagas.filter(v => {

                const matchesStatus = (v.status === selectedStatus) || (normalizeStatus(v.status, v.nome) === selectedStatus);

            return (

                                                <select
                                                    value={selectedStatus}

                                                >
                                                    <option value="all">Todos os Status</option>
                                                    <optgroup label="Telemetria">
                                                        {uniqueStatuses.map((s, i) => (

                                {filterText && (

                    {activeEquipment && (

        };

        // Analytics Page
        const AnalyticsPage = () => {
            const { vagas, loading } = useFleet();

            if (loading && vagas.length === 0) {
                return (
                    <div className="flex items-center justify-center h-full">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                    </div>
                );
            }

            // ========== CÁLCULO DE KPIs REAIS A PARTIR DOS DADOS DO FLEET CONTEXT ==========
            let totalMinFleet = 0, workingMin = 0, stoppedMin = 0, maintMin = 0, idleMin = 0, noDataMin = 0, secondaryMin = 0;
            const perEquip = [];
            let apropriados = 0, naoApropriados = 0;
            const hourlyEvents = new Array(24).fill(0);
            const statusCounts = { trabalhando: 0, parado: 0, manutencao: 0, semApropriacao: 0 };

            vagas.forEach(v => {
                let eqWork = 0, eqStopped = 0, eqMaint = 0, eqTotal = 0, eqIdle = 0, eqSecondary = 0;
                let hasData = false;

                if (v.eventos && v.eventos.length > 0) {
                    v.eventos.forEach(evt => {
                        const evtStatus = normalizeStatus(evt.status || evt.descricao, v.nome);
                        const duration = timeToMinutes(evt.tempoTotal);
                        eqTotal += duration;

                        // Hourly activity
                        const startStr = evt.dataInicio || '';
                        const hourMatch = startStr.match(/(\d{1,2}):\d{2}/);
                        if (hourMatch) {
                            const hr = parseInt(hourMatch[1], 10);
                            if (hr >= 0 && hr < 24) hourlyEvents[hr]++;
                        }

                        if (evtStatus === 'motor ligado') { eqWork += duration; statusCounts.trabalhando++; hasData = true; }
                        else if (evtStatus === 'motor secundário ligado') { eqWork += duration; eqSecondary += duration; statusCounts.trabalhando++; hasData = true; }
                        else if (evtStatus === 'em manutenção') { eqMaint += duration; statusCounts.manutencao++; hasData = true; }
                        else if (evtStatus === 'parado ligado' || evtStatus === 'parado' || evtStatus === 'motor desligado' || evtStatus === 'chave geral desligada' || evtStatus === 'fora da planta' || evtStatus === 'documentação' || evtStatus === 'abastecimento' || evtStatus === 'abastecimento (água) - lm' || evtStatus === 'refeição') { eqStopped += duration; statusCounts.parado++; hasData = true; }
                        else if (evtStatus === 'indisponível / sem apropriação' || evtStatus === 'indisponível' || evtStatus === 'sem apropriação') { eqIdle += duration; statusCounts.semApropriacao++; }
                        else { eqStopped += duration; statusCounts.parado++; hasData = true; }
                    });
                }

                if (hasData) apropriados++; else naoApropriados++;

                totalMinFleet += eqTotal;
                workingMin += eqWork;
                stoppedMin += eqStopped;
                maintMin += eqMaint;
                idleMin += eqIdle;
                secondaryMin += eqSecondary;

                const eqEfficiency = eqTotal > 0 ? ((eqWork / eqTotal) * 100).toFixed(1) : 0;
                perEquip.push({ name: v.nome, placa: v.placa, workMin: eqWork, stoppedMin: eqStopped, maintMin: eqMaint, totalMin: eqTotal, efficiency: parseFloat(eqEfficiency), secondaryMin: eqSecondary });
            });

            const workingPct = totalMinFleet > 0 ? (workingMin / totalMinFleet) * 100 : 0;
            const stoppedPct = totalMinFleet > 0 ? (stoppedMin / totalMinFleet) * 100 : 0;
            const maintPct = totalMinFleet > 0 ? (maintMin / totalMinFleet) * 100 : 0;
            const idlePct = totalMinFleet > 0 ? (idleMin / totalMinFleet) * 100 : 0;

            // Pie chart
            const totalSnap = Object.values(statusCounts).reduce((a, b) => a + b, 0) || 1;
            const snapWork = (statusCounts.trabalhando / totalSnap) * 100;
            const snapStop = (statusCounts.parado / totalSnap) * 100;
            const snapMaint = (statusCounts.manutencao / totalSnap) * 100;
            const pieGradient = `conic-gradient(#10b981 0% ${snapWork}%, #ef4444 ${snapWork}% ${snapWork + snapStop}%, #f59e0b ${snapWork + snapStop}% ${snapWork + snapStop + snapMaint}%, #cbd5e1 ${snapWork + snapStop + snapMaint}% 100%)`;

            // Ranking por eficiência (descendente)
            const ranking = [...perEquip].filter(e => e.totalMin > 0).sort((a, b) => b.efficiency - a.efficiency).slice(0, 10);

            // Hourly normalize
            const maxH = Math.max(...hourlyEvents, 1);
            const hourlyPct = hourlyEvents.map(v => Math.round((v / maxH) * 100));

            return (

                        <div>

                            <p className="text-slate-500 text-sm">KPIs calculados com dados reais da telemetria (lógica por tipo de ativo)</p>
                        </div>
                    </div>

                    {/* ROW 1: KPIs PRINCIPAIS */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">

                            <span className="text-xs font-bold text-emerald-600 uppercase tracking-wider">Produção Real</span>
                            <div className="text-4xl font-bold text-slate-800 mt-2">{workingPct.toFixed(1)}%</div>
                            <div className="w-full bg-slate-100 h-1.5 mt-3 rounded-full overflow-hidden"><div className="bg-emerald-500 h-full" style={{ width: `${workingPct}%` }}></div></div>
                            <p className="text-[10px] text-slate-400 mt-2">{formatMinutes(workingMin)} trabalhadas de {formatMinutes(totalMinFleet)} totais</p>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border border-red-100 shadow-sm relative overflow-hidden group">
                            <div className="absolute right-0 top-0 p-4 opacity-10 group-hover:scale-110 transition-transform"><AlertTriangle size={60} className="text-red-500" /></div>
                            <span className="text-xs font-bold text-red-600 uppercase tracking-wider">Motor Desligado / Parado</span>
                            <div className="text-4xl font-bold text-slate-800 mt-2">{stoppedPct.toFixed(1)}%</div>
                            <div className="w-full bg-slate-100 h-1.5 mt-3 rounded-full overflow-hidden"><div className="bg-red-500 h-full" style={{ width: `${stoppedPct}%` }}></div></div>
                            <p className="text-[10px] text-slate-400 mt-2">{formatMinutes(stoppedMin)} paradas</p>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border border-amber-100 shadow-sm relative overflow-hidden group">
                            <div className="absolute right-0 top-0 p-4 opacity-10 group-hover:scale-110 transition-transform"><AlertOctagon size={60} className="text-amber-500" /></div>
                            <span className="text-xs font-bold text-amber-600 uppercase tracking-wider">Manutenção</span>
                            <div className="text-4xl font-bold text-slate-800 mt-2">{maintPct.toFixed(1)}%</div>
                            <div className="w-full bg-slate-100 h-1.5 mt-3 rounded-full overflow-hidden"><div className="bg-amber-500 h-full" style={{ width: `${maintPct}%` }}></div></div>
                            <p className="text-[10px] text-slate-400 mt-2">{formatMinutes(maintMin)} em manutenção</p>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden group">
                            <div className="absolute right-0 top-0 p-4 opacity-10 group-hover:scale-110 transition-transform"><Truck size={60} className="text-slate-400" /></div>
                            <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Frota Total</span>
                            <div className="text-4xl font-bold text-slate-800 mt-2">{vagas.length}</div>
                            <p className="text-[10px] text-slate-400 mt-2"><span className="text-emerald-600 font-bold">{apropriados} apropriados</span> · <span className="text-red-500 font-bold">{naoApropriados} sem dados</span></p>
                        </div>
                    </div>

                    {/* ROW 2: KPIs SECUNDÁRIOS */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                        <div className="bg-white p-5 rounded-2xl border border-cyan-100 shadow-sm">
                            <span className="text-xs font-bold text-cyan-600 uppercase tracking-wider">Motor Secundário Ligado</span>
                            <div className="text-3xl font-bold text-slate-800 mt-2">{formatMinutes(secondaryMin)}</div>
                            <div className="w-full bg-slate-100 h-1.5 mt-3 rounded-full overflow-hidden"><div className="bg-cyan-500 h-full" style={{ width: `${totalMinFleet > 0 ? (secondaryMin / totalMinFleet) * 100 : 0}%` }}></div></div>
                            <p className="text-[10px] text-slate-400 mt-2 leading-relaxed">Tempo efetivo de jato/vácuo — somente quando o motor secundário está ativo é que o equipamento está realmente produzindo</p>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border border-yellow-100 shadow-sm">
                            <span className="text-xs font-bold text-yellow-600 uppercase tracking-wider">Parado Ligado (Improdutivo)</span>
                            <div className="text-3xl font-bold text-slate-800 mt-2">{formatMinutes(stoppedMin)}</div>
                            <div className="w-full bg-slate-100 h-1.5 mt-3 rounded-full overflow-hidden"><div className="bg-yellow-500 h-full" style={{ width: `${stoppedPct}%` }}></div></div>
                            <p className="text-[10px] text-slate-400 mt-2 leading-relaxed">Motor ligado em marcha lenta sem operar + Motor desligado. Custo sem retorno operacional</p>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
                            <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">Sem Apropriação</span>
                            <div className="text-3xl font-bold text-slate-800 mt-2">{idlePct.toFixed(1)}%</div>
                            <div className="w-full bg-slate-100 h-1.5 mt-3 rounded-full overflow-hidden"><div className="bg-slate-400 h-full" style={{ width: `${idlePct}%` }}></div></div>
                            <p className="text-[10px] text-slate-400 mt-2 leading-relaxed">{formatMinutes(idleMin)} — Equipamentos sem sinal GPS/dados — verifique conectividade</p>
                        </div>
                    </div>

                    {/* ROW 3: TIMELINE 24H */}
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-8">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                <Clock size={20} className="text-blue-600" /> Timeline de Atividade (24h)
                            </h3>
                            <span className="text-[10px] text-slate-400 uppercase">Eventos iniciados por hora</span>
                        </div>
                        <div className="overflow-x-auto pb-4 custom-scrollbar">
                            <div className="h-52 min-w-[600px] flex items-end justify-between gap-1 sm:gap-2 px-2 pb-2">
                                {hourlyPct.map((val, hour) => {
                                    let barColor = 'bg-slate-300';
                                    if (val > 20) barColor = 'bg-indigo-300';
                                    if (val > 50) barColor = 'bg-indigo-500';
                                    if (val > 80) barColor = 'bg-indigo-600';
                                    return (
                                        <div key={hour} className="flex-1 flex flex-col justify-end group cursor-pointer relative h-full">
                                            <div className={`w-full rounded-t-md transition-all duration-300 opacity-80 group-hover:opacity-100 ${barColor}`} style={{ height: `${val || 4}%`, minHeight: '4px' }}></div>
                                            <span className="text-[10px] text-slate-400 text-center mt-2 font-mono">{hour}h</span>
                                            <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block z-20">
                                                <div className="bg-slate-800 text-white text-xs py-1.5 px-3 rounded-lg shadow-xl whitespace-nowrap">
                                                    <span className="font-bold">{hourlyEvents[hour]} eventos</span>
                                                </div>
                                                <div className="w-2 h-2 bg-slate-800 rotate-45 mx-auto -mt-1"></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* ROW 4: PIE + RANKING */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col items-center">
                            <h3 className="text-sm font-bold text-slate-700 mb-6 w-full flex items-center gap-2">
                                <PieChart size={16} className="text-indigo-500" /> Distribuição de Status
                            </h3>
                            <div className="relative w-56 h-56 rounded-full shadow-inner mb-6 transition-all hover:scale-105 duration-500" style={{ background: pieGradient }}>
                                <div className="absolute inset-0 m-auto w-32 h-32 bg-white rounded-full flex items-center justify-center shadow-lg">
                                    <div className="text-center">
                                        <span className="block text-3xl font-bold text-slate-800">{vagas.length}</span>
                                        <span className="text-[10px] text-slate-400 uppercase tracking-wider font-bold">Vagas</span>
                                    </div>
                                </div>
                            </div>
                            <div className="w-full grid grid-cols-2 gap-2">
                                <div className="flex justify-between text-xs items-center p-2 bg-slate-50 rounded-lg"><span className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-emerald-500"></span> Produzindo</span> <span className="font-bold">{Math.round(snapWork)}%</span></div>
                                <div className="flex justify-between text-xs items-center p-2 bg-slate-50 rounded-lg"><span className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-red-500"></span> Parado</span> <span className="font-bold">{Math.round(snapStop)}%</span></div>
                                <div className="flex justify-between text-xs items-center p-2 bg-slate-50 rounded-lg"><span className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-amber-500"></span> Manutenção</span> <span className="font-bold">{Math.round(snapMaint)}%</span></div>
                                <div className="flex justify-between text-xs items-center p-2 bg-slate-50 rounded-lg"><span className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-slate-300"></span> Sem Dados</span> <span className="font-bold">{Math.round(100 - snapWork - snapStop - snapMaint)}%</span></div>
                            </div>
                        </div>

                        <div className="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-sm font-bold text-slate-700 flex items-center gap-2">
                                    <History size={16} className="text-blue-500" /> Produtividade por Equipamento (Top 10)
                                </h3>
                                <div className="flex items-center gap-3 text-[10px] text-slate-400">
                                    <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-emerald-500"></span> Trabalhando</span>
                                    <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-400"></span> Parado</span>
                                    <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-amber-400"></span> Manutenção</span>
                                    <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-slate-200"></span> Sem dados</span>
                                </div>
                            </div>
                            <div className="space-y-3">
                                {ranking.map((v, i) => {
                                    const wPct = v.totalMin > 0 ? (v.workMin / v.totalMin) * 100 : 0;
                                    const sPct = v.totalMin > 0 ? (v.stoppedMin / v.totalMin) * 100 : 0;
                                    const mPct = v.totalMin > 0 ? (v.maintMin / v.totalMin) * 100 : 0;
                                    const rPct = Math.max(0, 100 - wPct - sPct - mPct);
                                    return (
                                        <div key={i} className="flex items-center gap-4 hover:bg-slate-50 p-2 rounded-lg transition-colors">
                                            <div className={`font-bold text-lg w-8 h-8 flex items-center justify-center rounded-full shrink-0 ${i === 0 ? 'bg-yellow-100 text-yellow-600' : i < 3 ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-500'}`}>
                                                {i + 1}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between mb-1">
                                                    <span className="text-sm font-bold text-slate-700 truncate">{v.name}</span>
                                                    <span className={`text-xs font-bold px-2 py-0.5 rounded-full shrink-0 ml-2 ${v.efficiency >= 50 ? 'bg-emerald-100 text-emerald-700' : v.efficiency >= 20 ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}`}>{v.efficiency}%</span>
                                                </div>
                                                <div className="h-3 w-full bg-slate-100 rounded-full overflow-hidden flex" title={`Trabalhando: ${formatMinutes(v.workMin)} | Parado: ${formatMinutes(v.stoppedMin)} | Manutenção: ${formatMinutes(v.maintMin)}`}>
                                                    {wPct > 0 && <div className="bg-emerald-500 h-full" style={{ width: `${wPct}%` }}></div>}
                                                    {sPct > 0 && <div className="bg-red-400 h-full" style={{ width: `${sPct}%` }}></div>}
                                                    {mPct > 0 && <div className="bg-amber-400 h-full" style={{ width: `${mPct}%` }}></div>}
                                                    {rPct > 0 && <div className="bg-slate-200 h-full" style={{ width: `${rPct}%` }}></div>}
                                                </div>
                                                <div className="flex gap-3 mt-1 text-[10px] text-slate-400">
                                                    <span className="flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> {formatMinutes(v.workMin)}</span>
                                                    <span className="flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-red-400"></span> {formatMinutes(v.stoppedMin)}</span>
                                                    <span className="flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-amber-400"></span> {formatMinutes(v.maintMin)}</span>
                                                </div>
                                            </div>
                                            <div className="text-xs font-mono text-slate-400 border border-slate-200 px-2 py-1 rounded bg-white shrink-0">
                                                {v.placa}
                                            </div>
                                        </div>
                                    );
                                })}
                                {ranking.length === 0 && <div className="text-center text-slate-400 py-4">Sem dados de ranking</div>}
                            </div>
                        </div>
                    </div>

                    {/* ROW 5: TABELA COMPLETA POR EQUIPAMENTO */}
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-8">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-sm font-bold text-slate-700 flex items-center gap-2">
                                <Truck size={16} className="text-blue-500" /> Produtividade por Equipamento — Todos os Ativos
                            </h3>
                            <div className="flex items-center gap-3 text-[10px] text-slate-400">
                                <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-emerald-500"></span> Trab.</span>
                                <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-400"></span> Parado</span>
                                <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-amber-400"></span> Manut.</span>
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-xs text-left">
                                <thead className="bg-slate-100 text-slate-500 font-semibold">
                                    <tr>
                                        <th className="p-3 rounded-l-lg">Equipamento</th>
                                        <th className="p-3">Placa</th>
                                        <th className="p-3 text-center">Trabalhando</th>
                                        <th className="p-3 text-center">Parado</th>
                                        <th className="p-3 text-center">Manutenção</th>
                                        <th className="p-3 text-center">Motor 2º</th>
                                        <th className="p-3 text-center">Total</th>
                                        <th className="p-3 text-center" style={{ minWidth: '120px' }}>Distribuição</th>
                                        <th className="p-3 text-center rounded-r-lg">Eficiência</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {perEquip.sort((a, b) => b.efficiency - a.efficiency).map((eq, i) => {
                                        const tw = eq.totalMin > 0 ? (eq.workMin / eq.totalMin) * 100 : 0;
                                        const ts = eq.totalMin > 0 ? (eq.stoppedMin / eq.totalMin) * 100 : 0;
                                        const tm = eq.totalMin > 0 ? (eq.maintMin / eq.totalMin) * 100 : 0;
                                        return (
                                            <tr key={i} className="hover:bg-slate-50">
                                                <td className="p-3 font-bold text-slate-700 max-w-[200px] truncate">{eq.name}</td>
                                                <td className="p-3 font-mono text-slate-400">{eq.placa}</td>
                                                <td className="p-3 text-center text-emerald-600 font-bold">{formatMinutes(eq.workMin)}</td>
                                                <td className="p-3 text-center text-red-500 font-bold">{formatMinutes(eq.stoppedMin)}</td>
                                                <td className="p-3 text-center text-amber-600 font-bold">{formatMinutes(eq.maintMin)}</td>
                                                <td className="p-3 text-center text-cyan-600 font-bold">{formatMinutes(eq.secondaryMin)}</td>
                                                <td className="p-3 text-center text-slate-600 font-bold">{formatMinutes(eq.totalMin)}</td>
                                                <td className="p-3">
                                                    <div className="h-2.5 w-full bg-slate-100 rounded-full overflow-hidden flex" title={`Trab: ${formatMinutes(eq.workMin)} | Parado: ${formatMinutes(eq.stoppedMin)} | Manut: ${formatMinutes(eq.maintMin)}`}>
                                                        {tw > 0 && <div className="bg-emerald-500 h-full" style={{ width: `${tw}%` }}></div>}
                                                        {ts > 0 && <div className="bg-red-400 h-full" style={{ width: `${ts}%` }}></div>}
                                                        {tm > 0 && <div className="bg-amber-400 h-full" style={{ width: `${tm}%` }}></div>}
                                                    </div>
                                                </td>
                                                <td className="p-3 text-center">
                                                    <span className={`px-2 py-1 rounded-full text-xs font-bold ${eq.efficiency >= 50 ? 'bg-emerald-100 text-emerald-700' : eq.efficiency >= 20 ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}`}>
                                                        {eq.efficiency}%
                                                    </span>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // Alarmes Page
        const AlarmesPage = () => {
            const { alerts, handleDismissAlert, refreshAlerts } = useFleet();
            const [activeTab, setActiveTab] = useState('alerts');
            const [rules, setRules] = useState([]);
            const [rulesLoading, setRulesLoading] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingRule, setEditingRule] = useState(null);
            const [expandedAlert, setExpandedAlert] = useState(null);
            const [newRule, setNewRule] = useState({ name: '', conditionType: 'parado_mais_que', threshold: '2', severity: 'warning' });
            const { addToast } = useToast();

            useEffect(() => {
                (async () => {
                    const res = await api.getRules();
                    if (res.success && Array.isArray(res.rules)) setRules(res.rules);
                    setRulesLoading(false);
                })();
            }, []);

            const reloadRules = async () => {
                const res = await api.getRules();
                if (res.success && Array.isArray(res.rules)) setRules(res.rules);
            };

            const handleSaveRule = async () => {
                const rulePayload = {
                    name: newRule.name || 'Nova Regra',
                    condition: newRule.conditionType,
                    timeLimit: parseFloat(newRule.threshold) || 2,
                    severity: newRule.severity || 'warning'
                };
                if (editingRule) rulePayload.ruleId = editingRule.id;

                const res = await api.saveRule(rulePayload);
                if (res.success) {
                    await reloadRules();
                    addToast(editingRule ? 'Regra atualizada!' : 'Regra criada com sucesso!', 'success');
                } else {
                    addToast('Erro ao salvar regra.', 'critical');
                }
                closeModal();
            };

            const handleDeleteRule = async (ruleId) => {
                if (!confirm('Deseja realmente excluir esta regra?')) return;
                const res = await api.deleteRule(ruleId);
                if (res.success) {
                    await reloadRules();
                    addToast('Regra excluída.', 'info');
                } else {
                    addToast('Erro ao excluir regra.', 'critical');
                }
            };

            const handleToggleRule = async (ruleId, currentActive) => {
                const res = await api.toggleRule(ruleId, !currentActive);
                if (res.success) {
                    await reloadRules();
                    addToast(currentActive ? 'Regra desativada.' : 'Regra ativada!', 'info');
                } else {
                    addToast('Erro ao alterar estado da regra.', 'critical');
                }
            };

            const openEditModal = (rule) => {
                setEditingRule(rule);
                setNewRule({
                    name: rule.name || '',
                    conditionType: rule.condition || 'parado_mais_que',
                    threshold: String(rule.timeLimit || 2),
                    severity: rule.severity || 'warning'
                });
                setIsModalOpen(true);
            };

            const openCreateModal = () => {
                setEditingRule(null);
                setNewRule({ name: '', conditionType: 'parado_mais_que', threshold: '2', severity: 'warning' });
                setIsModalOpen(true);
            };

            const closeModal = () => {
                setIsModalOpen(false);
                setEditingRule(null);
                setNewRule({ name: '', conditionType: 'parado_mais_que', threshold: '2', severity: 'warning' });
            };

            const severityColors = {
                alta: { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-700', badge: 'bg-red-100 text-red-700', dot: 'bg-red-500' },
                warning: { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-700', badge: 'bg-amber-100 text-amber-700', dot: 'bg-amber-500' },
                info: { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700', badge: 'bg-blue-100 text-blue-700', dot: 'bg-blue-500' },
                critical: { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-700', badge: 'bg-red-100 text-red-700', dot: 'bg-red-500' },
            };

            const conditionLabels = {
                parado_mais_que: 'Parado mais que',
                sem_apropriacao_mais_que: 'Sem apropriação mais que',
                manutencao_mais_que: 'Em manutenção mais que',
                desligado_mais_que: 'Motor desligado mais que'
            };

            return (
                <div className="p-4 md:p-8 h-full overflow-y-auto custom-scrollbar bg-slate-50 animate-fade-in">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-6">
                        <div className="flex items-center gap-3 md:gap-4">
                            <div className="bg-red-600 p-2.5 md:p-3 rounded-xl text-white shadow-lg shadow-red-500/20 shrink-0">
                                <Bell size={22} />
                            </div>
                            <div className="min-w-0">
                                <h1 className="text-lg md:text-2xl font-bold text-slate-800 truncate">Gerenciamento de Alarmes</h1>
                                <p className="text-slate-500 text-xs md:text-sm hidden sm:block">Alertas ativos e regras de monitoramento</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 md:gap-3 w-full sm:w-auto">
                            <button onClick={refreshAlerts} className="flex-1 sm:flex-none bg-slate-100 text-slate-600 px-3 md:px-4 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-bold flex items-center justify-center gap-2 hover:bg-slate-200 transition-all">
                                <RefreshCw size={14} /> Atualizar
                            </button>
                            <button onClick={openCreateModal} className="flex-1 sm:flex-none bg-blue-600 text-white px-3 md:px-5 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-bold flex items-center justify-center gap-2 hover:bg-blue-500 transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                                <Plus size={16} /> Nova Regra
                            </button>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-1 mb-6 bg-slate-100 p-1 rounded-xl w-fit">
                        <button onClick={() => setActiveTab('alerts')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab === 'alerts' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                            <AlertTriangle size={16} /> Alertas Ativos
                            {alerts.length > 0 && <span className="bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">{alerts.length}</span>}
                        </button>
                        <button onClick={() => setActiveTab('rules')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab === 'rules' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                            <Settings size={16} /> Regras
                            {rules.length > 0 && <span className="bg-blue-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">{rules.length}</span>}
                        </button>
                    </div>

                    {/* Tab: Alertas Ativos */}
                    {
                        activeTab === 'alerts' && (
                            <div className="space-y-4">
                                {alerts.length === 0 ? (
                                    <div className="text-center py-20 bg-white rounded-2xl border-2 border-dashed border-slate-200">
                                        <CheckCircle size={48} className="mx-auto text-emerald-400 mb-4" />
                                        <p className="text-slate-500 font-bold text-lg">Nenhum alerta ativo</p>
                                        <p className="text-slate-400 text-sm mt-1">Todos os sistemas estão operando normalmente.</p>
                                    </div>
                                ) : alerts.map(alert => {
                                    const sev = severityColors[alert.severity] || severityColors.warning;
                                    const isExpanded = expandedAlert === alert.id;
                                    return (
                                        <div key={alert.id} className={`${sev.bg} border ${sev.border} rounded-2xl transition-all animate-fade-in overflow-hidden ${isExpanded ? 'ring-2 ring-offset-1 ring-blue-300' : ''}`}>
                                            <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between p-5 cursor-pointer" onClick={() => setExpandedAlert(isExpanded ? null : alert.id)}>
                                                <div className="flex items-start gap-4 mb-3 sm:mb-0 flex-1">
                                                    <div className={`p-3 rounded-xl ${sev.badge}`}>
                                                        <AlertTriangle size={22} />
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex items-center gap-2 mb-1 flex-wrap">
                                                            <h4 className={`font-bold ${sev.text}`}>{alert.titulo || 'Alerta'}</h4>
                                                            <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded-full ${sev.badge}`}>{alert.severity || 'warning'}</span>
                                                        </div>
                                                        <p className="text-sm text-slate-600 truncate">{alert.message}</p>
                                                        <div className="flex items-center gap-4 mt-2 text-xs text-slate-400">
                                                            <span className="flex items-center gap-1"><MapPin size={12} /> {alert.vaga}</span>
                                                            <span className="flex items-center gap-1"><Truck size={12} /> {alert.equipamento}</span>
                                                            <span className="flex items-center gap-1"><Clock size={12} /> {formatDateTime(alert.timestamp)}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2 shrink-0">
                                                    <ChevronDown size={16} className={`text-slate-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`} />
                                                </div>
                                            </div>
                                            {isExpanded && (
                                                <div className="border-t border-slate-200/50 p-4 md:p-5 bg-white/50 animate-fade-in">
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                                                        <div>
                                                            <span className="text-[10px] font-bold uppercase text-slate-400">Mensagem Completa</span>
                                                            <p className="text-sm text-slate-700 mt-1">{alert.message}</p>
                                                        </div>
                                                        <div>
                                                            <span className="text-[10px] font-bold uppercase text-slate-400">Condição Acionada</span>
                                                            <p className="text-sm text-slate-700 mt-1 font-mono">{conditionLabels[alert.condition] || alert.condition || 'N/D'} {alert.timeLimit ? `${alert.timeLimit}h` : ''}</p>
                                                        </div>
                                                        <div>
                                                            <span className="text-[10px] font-bold uppercase text-slate-400 flex items-center gap-1"><Clock size={10} /> Janela de Tempo</span>
                                                            {(() => {
                                                                try {
                                                                    const alertDate = new Date(alert.timestamp);
                                                                    if (isNaN(alertDate.getTime())) return <p className="text-sm text-slate-500 mt-1 italic">Sem dados</p>;
                                                                    const limitMs = (parseFloat(alert.timeLimit) || 1) * 3600000;
                                                                    const startDate = new Date(alertDate.getTime() - limitMs);
                                                                    const fmt = (d) => `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                                                                    return (
                                                                        <div className="mt-1">
                                                                            <p className="text-sm font-bold text-slate-800 bg-slate-100 px-2 py-1 rounded-lg inline-flex items-center gap-1.5">
                                                                                <span className="text-emerald-600">{fmt(startDate)}</span>
                                                                                <span className="text-slate-400">→</span>
                                                                                <span className="text-red-600">{fmt(alertDate)}</span>
                                                                            </p>

                <ToastProvider>
                    <FleetProvider>
                        <div className="flex flex-col h-screen bg-slate-50 font-sans text-slate-900 overflow-hidden">
                            <MobileHeader onOpen={() => setIsMobileMenuOpen(true)} />

                            <Sidebar
                                currentPage={currentPage}
                                onNavigate={setCurrentPage}
                                isOpen={isMobileMenuOpen}
                                onClose={() => setIsMobileMenuOpen(false)}
                            />

                            <main className="flex-1 md:ml-64 overflow-hidden relative flex flex-col transition-all duration-300 min-h-0">
                                {currentPage === 'monitoramento' && <MonitoramentoPage />}
                                {currentPage === 'analytics' && <AnalyticsPage />}
                                {currentPage === 'manutencao' && <MaintenanceTracker />}
                                {currentPage === 'alarmes' && <AlarmesPage />}
                                {currentPage === 'configuracoes' && <ConfiguracoesPage />}
                            </main>
                        </div>
                    </FleetProvider>
                </ToastProvider>
            );
        };

        // ============================================
        // RENDER
        // ============================================

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
